<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto Pro - Vic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            /* Fondo gris oscuro muy pro */
            background-color: #121212; 
            /* Letras blancas para que se lea perfecto */
            color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            /* Tarjeta en un gris un poco más claro para que resalte del fondo */
            background-color: #1e1e1e; 
            padding: 40px;
            border-radius: 15px;
            /* Sombra negra profunda */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 500px;
            text-align: center;
        }
        h1 {
            /* Título en rojo vibrante */
            color: #ff4d4d; 
            margin-bottom: 10px;
        }
        p {
            line-height: 1.6;
            /* Texto secundario en un blanco grisáceo para no cansar la vista */
            color: #b0b0b0; 
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            /* Botón rojo */
            background-color: #ff4d4d; 
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn:hover {
            /* Rojo más oscuro al pasar el mouse */
            background-color: #cc0000; 
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Bienvenido a mi Proyecto!</h1>
        <p>Esta es mi primera página web desplegada en GitHub Pages como Actividad Práctica.</p>
        <a href="https://github.com/vct-gl" class="btn">Ver mi GitHub</a>
    </div>
</body>
</html>
