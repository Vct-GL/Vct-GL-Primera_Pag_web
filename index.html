<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto Pro - Vic</title>
    <link rel="icon" href="wolf.ico" type="image/x-icon" sizes="16x16 32x32 48x48">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            /* Fondo gris oscuro muy pro */
            background-color: #121212; 
            /* Letras blancas para que se lea perfecto */
            color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            /* Tarjeta en un gris un poco más claro para que resalte del fondo */
            background-color: #1e1e1e; 
            padding: 40px;
            border-radius: 15px;
            /* Sombra negra profunda */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 500px;
            text-align: center;
        }
        h1 {
            /* Título en rojo vibrante */
            color: #ff4d4d; 
            margin-bottom: 10px;
        }
        p {
            line-height: 1.6;
            /* Texto secundario en un blanco grisáceo para no cansar la vista */
            color: #b0b0b0; 
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            /* Botón rojo */
            background-color: #ff4d4d; 
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn:hover {
            /* Rojo más oscuro al pasar el mouse */
            background-color: #cc0000; 
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container" id="mainWelcomeCard">
        <h1>¡Bienvenido a mi Proyecto!</h1>
        <p>Esta es mi primera página web desplegada en GitHub Pages como Actividad Práctica.</p>
        <a href="https://github.com/vct-gl" class="btn" id="myBotonPro">Ver mi GitHub</a>
    </div>
    <div class="bot-rebelde-container" id="botRebelde">
  <img src="bot.png" alt="Bot Rebelde de Vic" class="bot-img">
  <div class="bot-char-bubble">Mehh...</div>
</div>

<style>
  .bot-rebelde-container {
    position: fixed;
    width: 100px;  
    height: 100px;
    z-index: 1000; 
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px; 
    image-rendering: pixelated; 
    image-rendering: crisp-edges; 
    transition: transform 0.1s linear, top 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    left: calc(100% - 150px);
    top: calc(100% - 150px);
  }

  .bot-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(204, 0, 0, 0.7)); 
    transition: transform 0.1s linear;
  }
  
  .bot-char-bubble {
    position: absolute;
    top: -55px;
    background-color: #1a1a1a; 
    color: #00ff00; 
    padding: 8px 15px;
    border-radius: 4px;
    border: 2px solid #00ff00;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    font-weight: bold;
    white-space: nowrap;
    opacity: 0; 
    transform: scale(0);
    transition: all 0.3s ease;
    pointer-events: none;
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
  }

  .bot-rebelde-container.rebelde .bot-char-bubble {
    opacity: 1;
    transform: scale(1);
  }
</style>

<script>
  const botCont = document.getElementById('botRebelde'); // Usando tu ID actual de la imagen
  const botImg = botCont.querySelector('.bot-img');
  
  let botCurrentX = window.innerWidth - 150;
  let botCurrentY = window.innerHeight - 150;

  window.addEventListener('mousemove', (e) => {
    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const dx = mouseX - (botCurrentX + 50); 
    const dy = mouseY - (botCurrentY + 50);
    const distance = Math.sqrt(dx*dx + dy*dy);

    if (distance < 160) { 
      let foundSafe = false;
      let attempts = 0;

      while (!foundSafe && attempts < 15) {
        attempts++;
        const angle = Math.random() * Math.PI * 2;
        const force = 300;
        
        let newX = botCurrentX + Math.cos(angle) * force;
        let newY = botCurrentY + Math.sin(angle) * force;

        // Límites de pantalla
        newX = Math.max(50, Math.min(window.innerWidth - 150, newX));
        newY = Math.max(50, Math.min(window.innerHeight - 150, newY));

        // --- VERIFICACIÓN DE COLISIÓN CON TU CUADRO ---
        const welcomeCard = document.getElementById('mainWelcomeCard');
        const cardRect = welcomeCard.getBoundingClientRect();
        const margin = 50; // Espacio extra para que no roce el cuadro

        const insideCard = 
          newX > (cardRect.left - margin) && 
          newX < (cardRect.right + margin) && 
          newY > (cardRect.top - margin) && 
          newY < (cardRect.bottom + margin);

        if (!insideCard) {
          foundSafe = true;
          botCurrentX = newX;
          botCurrentY = newY;
          botCont.style.left = botCurrentX + 'px';
          botCont.style.top = botCurrentY + 'px';
          
          // Activamos la burbuja con los tres puntos "..."
          const bubble = botCont.querySelector('.bot-char-bubble');
          bubble.innerText = "..."; // Cambiamos el Mehh por puntos
          botCont.classList.add('rebelde');
          setTimeout(() => botCont.classList.remove('rebelde'), 1000);
        }
      }
    }

    // Mirada 3D sutil
    const rotX = (mouseY - window.innerHeight / 2) / (window.innerHeight / 2) * -8;
    const rotY = (mouseX - window.innerWidth / 2) / (window.innerWidth / 2) * 8;
    botImg.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  });
</script>

</body>
</html>
